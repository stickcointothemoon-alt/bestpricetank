name: Update Fuel Prices

on:
  schedule:
    # Täglich um 06:00 und 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Manuell ausführbar

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Fuel Prices
        run: node scripts/fetch-prices.js
        env:
          FUELO_KEY: ${{ secrets.FUELO_KEY }}

      - name: Commit & Push if prices changed
        run: |
          git config user.name "PriceBot"
          git config user.email "bot@bestpricetank.de"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "🔄 Preisupdate $(date '+%d.%m.%Y %H:%M')"
          git push
