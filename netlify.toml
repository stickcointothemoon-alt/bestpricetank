[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/pl-prices"
  to = "/.netlify/functions/fetch-pl-prices"
  status = 200

[[redirects]]
  from = "/api/pl-prices/latest"
  to = "/.netlify/functions/get-pl-prices"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
